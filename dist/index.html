<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo Medical Site</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="site-brand"><img class="site-logo" src="path/to/image.jpg">
        <h1>Demo Medical Site</h1>
      </div>
      <div class="header-actions"><a class="button secondary" href="/signin">Sign in</a>
      </div>
    </header>
    <div class="page">
      <main class="page-content">
        <div class="dashboard-hero">
          <h2>Welcome to the dashboard.</h2>
          <p>Sign in to personalize your experience.</p>
        </div>
        <div class="dashboard-grid">
          <div class="tile weather-tile">
            <div class="tile-header"><span>Weather</span></div>
            <div class="tile-body weather-body">
              <p class="placeholder">Weather unavailable</p>
            </div>
          </div>
          <div class="tile">
            <div class="tile-header"><span>Placehold</span></div>
            <div class="tile-body">
              <p class="placeholder">Chart placeholder</p>
            </div>
          </div>
          <div class="tile">
            <div class="tile-header"><span>Placehold</span></div>
            <div class="tile-body">
              <p class="placeholder">Chart placeholder</p>
            </div>
          </div>
          <div class="tile">
            <div class="tile-header"><span>Placehold</span></div>
            <div class="tile-body">
              <p class="placeholder">Chart placeholder</p>
            </div>
          </div>
        </div>
      </main>
      <footer class="site-footer">
        <p id="last-update">Loading...</p>
      </footer>
    </div>
    <script>
      fetch('/api/date')
        .then(res => res.json())
        .then(data => {
          if (document.getElementById('last-update')) {
            document.getElementById('last-update').textContent = 'Last Update: ' + data.date;
          }
        })
        .catch(() => {
          if (document.getElementById('last-update')) {
            document.getElementById('last-update').textContent = 'Last Update: ' + new Date().toLocaleDateString();
          }
        });
    </script>
  </body>
</html>
